# hzw.sso Docker 容器内配置
# 使用 Docker 内部网络地址(mysql/hydra 为容器名)

app:
  name: hzw.sso
  base_url: http://localhost:8080
  addr: :8080

sso:
  hydra:
    admin_url: http://hydra:4445
    public_url: http://localhost:4446
  jwt:
    secret: dev-secret-not-for-production
    expire: 86400

mysql:
  host: mysql
  port: 3306
  user: root
  password: rootpass
  database: sso
  charset: utf8mb4

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

log:
  level: info
  format: json
  output: stdout
  file_path: ""
  max_size: 0
  max_backups: 0
  max_age: 0
