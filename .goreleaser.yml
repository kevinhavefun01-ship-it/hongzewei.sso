# .goreleaser 配置 — GitHub Releases 自动发版
# 文档: https://goreleaser.com/

version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: sso-server
    main: ./cmd/server/
    binary: sso-server
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - configs/config.example.yaml
      - docker/
      - migration/

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - image_templates:
      - "hongzewei/hzw-sso:{{ .Version }}"
      - "hongzewei/hzw-sso:latest"
    dockerfile: docker/Dockerfile
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
